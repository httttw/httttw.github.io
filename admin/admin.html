<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyCrypto Admin Redirect</title>
    <meta http-equiv="refresh" content="0; url=../admin.html">
    <link rel="canonical" href="../admin.html">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #120f1f 0%, #2d1b55 100%);
            color: #fff;
            font-family: Arial, sans-serif;
        }

        .redirect-card {
            width: min(92vw, 420px);
            padding: 28px 24px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 18px 42px rgba(0, 0, 0, 0.28);
            text-align: center;
        }

        .redirect-card h1 {
            margin: 0 0 12px;
            font-size: 24px;
        }

        .redirect-card p {
            margin: 0;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.82);
        }

        .redirect-card a {
            color: #9ad1ff;
        }
    </style>
    <script>
        (function () {
            const target = new URL('../admin.html', window.location.href);
            target.search = window.location.search;
            target.hash = window.location.hash;
            window.location.replace(target.toString());
        })();
    </script>
</head>

<body>
    <div class="redirect-card">
        <h1>Redirecting to Main Admin</h1>
        <p>This legacy backend path now uses the canonical admin console to keep all controls, ET time display, and perpetual logic fully synchronized.</p>
        <p style="margin-top: 12px;"><a href="../admin.html">Open main admin manually</a></p>
    </div>
</body>

</html>
